version: "3.9"

services:
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    ports:
      - "3002:3002"
    expose:
      - "3002"
    environment:
      PORT: ${PORT:-3002}
      NODE_ENV: ${NODE_ENV:-production}
      APP_URL: ${APP_URL:-https://kauvio.ch}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:3010}
      AFFILIATE_DEFAULT_TAG: ${AFFILIATE_DEFAULT_TAG:-kauvio-default}
    depends_on:
      - postgres
      - redis
      - ai_service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile.timeout
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      FAST_CRAWLER_INTERVAL_SECONDS: 600
      FULL_CRAWLER_INTERVAL_SECONDS: 3600
      IMPORT_LIMIT_PER_PAGE: 36
      CRAWLER_FETCH_TIMEOUT_MS: 120000
      CRAWLER_AUTO_START_FAST: "false"
      CRAWLER_AUTO_START_FULL: "false"
      CRAWLER_SITEMAP_MAX_FILES: 8
      CRAWLER_URL_BATCH_MULTIPLIER: 3
      DIGITEC_IMPORT_URLS: https://www.digitec.ch/sitemap/v2/products-sitemap.xml
      GALAXUS_IMPORT_URLS: https://www.galaxus.ch/sitemap/v2/products-sitemap.xml
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  ai_service:
    build:
      context: ./services/ai_service
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3010/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-alerts@kauvio.ch}
      ALERT_CHECK_INTERVAL_SECONDS: ${ALERT_CHECK_INTERVAL_SECONDS:-120}
      AI_SEARCH_WORKER_INTERVAL_SECONDS: ${AI_SEARCH_WORKER_INTERVAL_SECONDS:-30}
      CRAWLER_FETCH_TIMEOUT_MS: ${CRAWLER_FETCH_TIMEOUT_MS:-25000}
      WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${WORKER_HEARTBEAT_MAX_AGE_SECONDS:-600}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "node", "worker_healthcheck.mjs"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kauvio}
      POSTGRES_USER: ${POSTGRES_USER:-kauvio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - kauvio_postgres_data_v42:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\" --save \"\" --appendonly no"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  kauvio_postgres_data_v42:
